name: Dataset Validation and Verification
description: Validate dataset schema, verify projects can be built and tests pass
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dataset/**'

jobs:
  validate-schema-and-list-entries:
    runs-on: windows-latest
    outputs:
      entries: ${{ steps.get-entries.outputs.entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install

      - name: Install bcbench package
        run: |
          uv sync

      - name: Validate dataset schema
        run: |
          uv run bcbench dataset validate

      - name: Get entries for matrix
        id: get-entries
        run: |
          switch ("${{ github.event_name }}") {
            "workflow_dispatch" {
              uv run bcbench dataset list --github-output entries
            }
            "pull_request" {
              uv run bcbench dataset list --github-output entries --modified-only
            }
            default {
              uv run bcbench dataset list --github-output entries
            }
          }
        shell: pwsh

  verify-build-and-tests:
    runs-on: windows-latest
    needs: validate-schema-and-list-entries
    env:
      BC_CONTAINER_NAME: bcbench
      BC_CONTAINER_USERNAME: admin
      BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
    if: needs.validate-schema-and-list-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.validate-schema-and-list-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and repository for ${{ matrix.entry }}
        id: setup-env
        env:
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ matrix.entry }}"
        shell: pwsh

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: |
          .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh
