name: Dataset Validation and Verification
permissions:
  contents: read

on:
  push:
    branches:
      - master_thesis
    paths:
      - "dataset/**"
  workflow_dispatch:
    inputs:
      test-run:
        description: "Indicate this is a test run (with few entries)"
        required: false
        default: true
        type: boolean
      base-ref:
        description: "Git ref to diff against for modified-only (e.g., HEAD~1)"
        required: false
        default: "origin/main"
        type: string
  schedule:
    - cron: "0 0 * * 0"

jobs:
  get-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      modified-only: ${{ github.event_name == 'push' }}
      base-ref: ${{ inputs.base-ref || 'HEAD~1' }}
      test-run: ${{ inputs.test-run || false }}
      category: "bug-fix"
      include-counterfactual: false

  verify-build-and-tests:
    runs-on: [GitHub-BCBench]
    needs: get-entries
    if: needs.get-entries.outputs.entries != '[]'
    environment:
      name: ado-read
      deployment: false
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup BC container
        id: setup-env
        timeout-minutes: 40
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.repo_path }}"
        shell: pwsh
