name: Evaluation with mini Agent
description: Evaluate using mini-bc-agent
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'model to use for evaluation'
        required: false
        default: 'azure/gpt-4.1'
        type: choice
        options:
          - 'azure/gpt-4.1'
      bc_tools_enabled:
        description: 'Allow mini-bc-agent to use BC build and test commands'
        required: false
        default: false
        type: boolean

env:
  EVALUATION_RESULTS_DIR: evaluation_results

jobs:
  get-entries:
    uses: ./.github/workflows/get-entries.yml

  evaluate-with-mini-agent:
    runs-on: windows-latest
    needs: get-entries
    outputs:
      results-dir: ${{ env.EVALUATION_RESULTS_DIR }}
    env:
      BC_CONTAINER_NAME: bcbench
      BC_CONTAINER_USERNAME: admin
      BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
    if: needs.get-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup BC container
        id: setup-env
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          ado-token: ${{ secrets.ADO_TOKEN }}

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Run mini-bc-agent for entry ${{ matrix.entry }}
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
        run: |
          $args = @(
            'evaluate', 'mini', "${{ matrix.entry }}",
            '--model', "${{ github.event.inputs.model }}",
            '--repo-path', "${{ steps.setup-env.outputs.repo_path }}",
            '--output-dir', "${{ env.EVALUATION_RESULTS_DIR }}",
            '--step-limit', '50'
          )
          if ('${{ github.event.inputs.bc_tools_enabled }}' -eq 'true') {
            $args += '--enable-bc-tools'
          }
          uv run bcbench @args

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.entry }}
          path: ${{ env.EVALUATION_RESULTS_DIR }}/
          retention-days: 30

  summarize-results:
    needs: evaluate-with-mini-agent
    if: always()
    uses: ./.github/workflows/summarize-results.yml
    permissions:
      contents: write
    with:
      results-dir: ${{ needs.evaluate-with-mini-agent.outputs.results-dir }}
      model: ${{ github.event.inputs.model }}
      agent: 'mini-bc-agent'
    secrets: inherit
