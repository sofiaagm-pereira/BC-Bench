name: Dataset Validation and Verification
permissions:
  contents: read

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sundays at midnight
  pull_request:
    paths:
      - "dataset/**"

jobs:
  validate-schema-and-list-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      modified-only: ${{ github.event_name == 'pull_request' }}
      validate-schema: true

  verify-build-and-tests:
    runs-on: [self-hosted, 1ES.Pool=GitHub-BCBench]
    needs: validate-schema-and-list-entries
    if: needs.validate-schema-and-list-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.validate-schema-and-list-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup BC container
        id: setup-env
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          ado-token: ${{ secrets.ADO_TOKEN }}

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.repo_path }}"
        shell: pwsh
