name: Evaluation with mini Agent
description: Evaluate using mini-bc-agent
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      bc_tools_enabled:
        description: 'Allow mini-bc-agent to use BC build and test commands'
        required: false
        default: 'true'
        type: boolean

env:
  EVALUATION_RESULTS_DIR: evaluation_results

jobs:
  get-entries:
    runs-on: windows-latest
    outputs:
      entries: ${{ steps.get-entries.outputs.entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Get entries for matrix
        id: get-entries
        run: |
          python -m bcbench dataset list --github-output entries
        shell: pwsh

  evaluate-with-mini-agent:
    runs-on: windows-latest
    needs: get-entries
    if: needs.get-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and repository for ${{ matrix.entry }}
        id: setup-env
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ matrix.entry }}"
        shell: pwsh

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Run mini-bc-agent for entry ${{ matrix.entry }}
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
        run: |
          $args = @(
            'evaluate', 'mini', "${{ matrix.entry }}",
            '--container-name', "${{ steps.setup-env.outputs.container_name }}",
            '--repo-path', "${{ steps.setup-env.outputs.nav_clone_path }}",
            '--output-dir', "${{ env.EVALUATION_RESULTS_DIR }}",
            '--run-id', '${{ github.run_id }}',
            '--step-limit', '50'
          )
          if ('${{ github.event.inputs.bc_tools_enabled }}' -eq 'true') {
            $args += '--enable-bc-tools'
          }
          python -m bcbench @args
        shell: pwsh

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.entry }}
          path: "${{ env.EVALUATION_RESULTS_DIR }}/"
          retention-days: 30

  summarize-results:
    name: Results
    runs-on: windows-latest
    needs: evaluate-with-mini-agent
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          path: "${{ env.EVALUATION_RESULTS_DIR }}/"
          merge-multiple: true

      - name: Summarize evaluation results
        run: |
          python -m bcbench evaluate summarize ${{ github.run_id }}
        shell: pwsh
