name: Evaluation with Mini Agent
description: Evaluate using mini-bc-agent
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  get-entries:
    runs-on: windows-latest
    outputs:
      entry_matrix: ${{ steps.get-entries.outputs.entry_matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Get all entries with version info for matrix
        id: get-entries
        run: |
          python -m bcbench dataset entry-matrix --github-output entry_matrix
        shell: pwsh

  evaluate-with-mini-agent:
    runs-on: windows-latest
    needs: get-entries
    if: needs.get-entries.outputs.entry_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.get-entries.outputs.entry_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and clone NAV repository for Version ${{ matrix.version }}
        id: setup-env
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          cd scripts/powershell
          .\Setup-ContainerAndRepository.ps1 -Version "${{ matrix.version }}"
        shell: pwsh

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Generate Patch using mini-bc-agent for entry ${{ matrix.entry }}
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
        run: |
          python -m bcbench agent mini "${{ matrix.entry }}" --repo-path "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh

      - name: Running FAIL to PASS tests to verify the generated patch
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
        run: |
          cd scripts/powershell
          .\Evaluate.ps1 -InstanceID "${{ matrix.entry }}" -NavClonePath "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh