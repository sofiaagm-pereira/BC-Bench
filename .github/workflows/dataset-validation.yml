name: Dataset Validation and Verification
description: Validate dataset schema, verify projects can be built and tests pass
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  validate-dataset-schema:
    runs-on: windows-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Validate dataset schema
        run: |
          python -m bcbench dataset validate

      - name: Get unique versions for matrix
        id: get-versions
        run: |
          python -m bcbench dataset versions --github-output versions
        shell: pwsh

  verify-build-and-tests:
    runs-on: windows-latest
    needs: validate-dataset-schema
    if: needs.validate-dataset-schema.outputs.versions != '[]'
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.validate-dataset-schema.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and clone NAV repository for Version ${{ matrix.version }}
        id: setup-env
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          cd scripts/powershell
          .\Setup-ContainerAndRepository.ps1 -Version "${{ matrix.version }}"
        shell: pwsh

      - name: Run build and test verification for Version ${{ matrix.version }}
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
        run: |
          cd scripts/powershell
          .\Verify-BuildAndTests.ps1 -Version "${{ matrix.version }}" -NAVClonePath "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh