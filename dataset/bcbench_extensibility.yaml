            Change the `CheckAmountType` procedure from `local` to public (remove the `local` keyword) in table 7001 "Price List Line".

            **Current code:**

            ```al
            local procedure CheckAmountType(FldCaption: Text; AmountType: Enum "Price Amount Type")
