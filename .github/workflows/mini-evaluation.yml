name: Evaluation with mini Agent
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      model:
        description: "model to use for evaluation"
        required: false
        default: "gpt-5.1-codex-mini"
        type: choice
        options:
          - "gpt-5.1-codex-mini"
      category:
        description: "Evaluation category to run"
        required: false
        default: "bug-fix"
        type: choice
        options:
          - "bug-fix"
          - "test-generation"
      test-run:
        description: "Indicate this is a test run (with few entries)"
        required: false
        default: true
        type: boolean

concurrency:
  group: mini-evaluation-${{ inputs.model }}-${{ inputs.test-run && 'test' || 'full' }}
  cancel-in-progress: false

env:
  EVALUATION_RESULTS_DIR: evaluation_results

jobs:
  get-entries:
    uses: ./.github/workflows/get-entries.yml
    with:
      test-run: ${{ inputs.test-run }}

  evaluate-with-mini-agent:
    runs-on: [self-hosted, 1ES.Pool=GitHub-BCBench]
    needs: get-entries
    outputs:
      results-dir: ${{ env.EVALUATION_RESULTS_DIR }}
    if: needs.get-entries.outputs.entries != '[]'
    environment: ado-read
    permissions:
      contents: read
      id-token: write
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        entry: ${{ fromJson(needs.get-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup BC container
        id: setup-env
        timeout-minutes: 40
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Azure Login with OIDC for Microsoft Foundry
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run mini-bc-agent for entry ${{ matrix.entry }}
        timeout-minutes: 60
        env:
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
        run: |
          $env:AZURE_AD_TOKEN = az account get-access-token --resource https://cognitiveservices.azure.com --query accessToken -o tsv

          uv run bcbench evaluate mini "${{ matrix.entry }}" `
            --model "${{ inputs.model }}" `
            --category "${{ inputs.category }}" `
            --repo-path "${{ steps.setup-env.outputs.repo_path }}" `
            --output-dir "${{ env.EVALUATION_RESULTS_DIR }}"

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.entry }}
          path: ${{ env.EVALUATION_RESULTS_DIR }}
          retention-days: ${{ inputs.test-run && 1 || 30 }}

  summarize-results:
    needs: evaluate-with-mini-agent
    uses: ./.github/workflows/summarize-results.yml
    permissions:
      contents: write
      id-token: write
    with:
      results-dir: ${{ needs.evaluate-with-mini-agent.outputs.results-dir }}
      model: ${{ inputs.model }}
      agent: "mini-bc-agent"
      mock: ${{ inputs.test-run }}
      category: ${{ inputs.category }}
    secrets: inherit
