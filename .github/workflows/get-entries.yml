name: Get Dataset Entries
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      modified-only:
        description: Only return modified entries (for PR contexts)
        required: false
        type: boolean
        default: false
      base-ref:
        description: Git ref to diff against when using modified-only (e.g., HEAD~1, a commit SHA)
        required: false
        type: string
        default: origin/main
      test-run:
        description: Indicate this is a test run (with 2 entries)
        required: false
        type: boolean
        default: false
      category:
        description: Evaluation category
        required: true
        type: string
        default: "bug-fix"
      include-counterfactual:
        description: Include counterfactual entries from counterfactual.jsonl
        required: false
        type: boolean
        default: true
    outputs:
      entries:
        description: JSON array of dataset entries
        value: ${{ jobs.get-entries.outputs.entries }}

jobs:
  get-entries:
    runs-on: ubuntu-latest
    outputs:
      entries: ${{ steps.get-entries.outputs.entries }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: ${{ inputs.modified-only && '0' || '1' }}

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Get entries for matrix
        id: get-entries
        run: |
          cmd="uv run bcbench dataset list --category ${{ inputs.category }} --github-output entries"

          if [[ "${{ inputs.modified-only }}" == "true" ]]; then
            cmd="$cmd --modified-only --base-ref '${{ inputs.base-ref }}'"
          elif [[ "${{ inputs.test-run }}" == "true" ]]; then
            cmd="$cmd --test-run"
          fi

          if [[ "${{ inputs.include-counterfactual }}" == "false" ]]; then
            cmd="$cmd --no-include-counterfactual"
          fi

          eval "$cmd"
