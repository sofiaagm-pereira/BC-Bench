name: Setup BC Container
description: Install BcContainerHelper and setup BC container with repository

inputs:
  instance-id:
    description: Instance ID for the dataset entry
    required: true
  github-token:
    description: GitHub token for accessing public repositories
    required: true
  skip-container:
    description: Skip BC container setup (only clone repository)
    required: false
    default: "false"

outputs:
  repo_path:
    description: Path to the cloned repository
    value: ${{ steps.setup.outputs.repo_path }}

runs:
  using: composite
  steps:
    - name: Generate BC container name and credentials
      if: inputs.skip-container != 'true'
      run: |
        # Generate a 32-character random password using Get-Random
        # The password is short-lived and only used for the duration of the workflow
        $password = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 32 | ForEach-Object { [char]$_ })

        # Mask the password in GitHub Actions logs
        Write-Output "::add-mask::$password"

        "BC_CONTAINER_NAME=bcbench-$("${{ inputs.instance-id }}".Split('-')[-1])" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_USERNAME=admin" | Out-File -FilePath $env:GITHUB_ENV -Append
        "BC_CONTAINER_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: pwsh

    - name: Install BcContainerHelper module
      if: inputs.skip-container != 'true'
      run: Install-Module -Name BcContainerHelper -Force -AllowClobber -AllowPrerelease
      shell: pwsh

    - name: Setup BC container and repository for ${{ inputs.instance-id }}
      id: setup
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        Write-Output "::add-mask::$env:GITHUB_TOKEN"

        .\scripts\Setup-ContainerAndRepository.ps1 -InstanceId "${{ inputs.instance-id }}" ${{ inputs.skip-container == 'true' && '-SkipContainer' || '' }}
      shell: pwsh
