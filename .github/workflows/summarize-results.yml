name: Summarize Evaluation Results
description: Reusable workflow to download and summarize evaluation results

on:
  workflow_call:
    inputs:
      results-dir:
        description: Directory to download results to
        required: true
        type: string

jobs:
  summarize-results:
    name: Results
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.results-dir }}/
          merge-multiple: true

      - name: Summarize evaluation results
        run: |
          uv run bcbench evaluate summarize --result-dir "${{ inputs.results-dir }}"
        shell: pwsh

      - name: Upload evaluation summary
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-summary
          path: ${{ inputs.results-dir }}/${{ github.run_id }}/evaluation_summary.json
          if-no-files-found: error
          retention-days: 30
