name: Evaluation with Mini Agent
description: Evaluate using mini-bc-agent
permissions:
  contents: read

on:
  workflow_dispatch:

env:
  EVALUATION_RESULTS_DIR: evaluation_results

jobs:
  get-entries:
    runs-on: windows-latest
    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Get unique versions for matrix
        id: get-versions
        run: |
          python -m bcbench dataset versions --github-output versions
        shell: pwsh

  evaluate-with-mini-agent:
    runs-on: windows-latest
    needs: get-entries
    if: needs.get-entries.outputs.versions != '[]'
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.get-entries.outputs.versions) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install BcContainerHelper module
        run: |
          Install-Module -Name BcContainerHelper -Force -AllowClobber
        shell: pwsh

      - name: Setup BC container and clone NAV repository for Version ${{ matrix.version }}
        id: setup-env
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          NAV_REPO_TOKEN: ${{ secrets.NAV_REPO_TOKEN }}
        run: |
          cd scripts/powershell
          .\Setup-ContainerAndRepository.ps1 -Version "${{ matrix.version }}"
        shell: pwsh

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Run mini-bc-agent for all entries within version ${{ matrix.version }}
        env:
          BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE: ${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
        run: |
          python -m bcbench evaluate mini "${{ matrix.version }}" `
            --container-name "${{ steps.setup-env.outputs.container_name }}" `
            --repo-path "${{ steps.setup-env.outputs.nav_clone_path }}" `
            --output-dir "${{ env.EVALUATION_RESULTS_DIR }}" `
            --run-id ${{ github.run_id }} `
            --step-limit 50 `
            --enable-bc-tools
        shell: pwsh

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-results-${{ github.run_id }}-${{ matrix.version }}
          path: "${{ env.EVALUATION_RESULTS_DIR }}/"
          retention-days: 30

  summarize-results:
    runs-on: windows-latest
    needs: evaluate-with-mini-agent
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install bcbench package
        run: |
          pip install -e .

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          path: "${{ env.EVALUATION_RESULTS_DIR }}/"
          merge-multiple: true

      - name: Summarize evaluation results
        run: |
          python -m bcbench evaluate summarize ${{ github.run_id }}
        shell: pwsh