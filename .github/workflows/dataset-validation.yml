name: Dataset Validation and Verification
description: Validate dataset schema, verify projects can be built and tests pass
permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'dataset/**'

jobs:
  validate-schema-and-list-entries:
    uses: ./.github/workflows/reusable/get-entries.yml
    with:
      modified-only: ${{ github.event_name == 'pull_request' }}
      validate-schema: true

  verify-build-and-tests:
    runs-on: windows-latest
    needs: validate-schema-and-list-entries
    env:
      BC_CONTAINER_NAME: bcbench
      BC_CONTAINER_USERNAME: admin
      BC_CONTAINER_PASSWORD: ${{ secrets.BC_CONTAINER_PASSWORD }}
    if: needs.validate-schema-and-list-entries.outputs.entries != '[]'
    name: ${{ matrix.entry }}
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.validate-schema-and-list-entries.outputs.entries) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup BC container
        id: setup-env
        uses: ./.github/actions/setup-bc-container
        with:
          instance-id: ${{ matrix.entry }}
          nav-repo-token: ${{ secrets.NAV_REPO_TOKEN }}

      - name: Run build and test verification for ${{ matrix.entry }}
        timeout-minutes: 60
        run: |
          .\scripts\Verify-BuildAndTests.ps1 -InstanceId "${{ matrix.entry }}" -RepoPath "${{ steps.setup-env.outputs.nav_clone_path }}"
        shell: pwsh
