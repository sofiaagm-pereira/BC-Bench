name: Summarize Evaluation Results

on:
  workflow_call:
    inputs:
      results-dir:
        description: Directory to download results to
        required: true
        type: string
      model:
        description: "model to use for evaluation"
        required: true
        type: string
      agent:
        description: "type of agent used for evaluation"
        required: true
        type: string
      mock:
        description: "whether a mock evaluation was used"
        required: false
        type: boolean
        default: false

env:
  BCEVAL_RESULT_FILE: bceval_results.jsonl
  SUMMARY_OUTPUT_FILE: evaluation_summary.json

jobs:
  summarize-results:
    name: Results
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python with UV
        uses: ./.github/actions/setup-python-uv

      - name: Download all evaluation results
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.results-dir }}/
          merge-multiple: true

      - name: Summarize evaluation results
        run: uv run bcbench result summarize --result-dir "${{ inputs.results-dir }}" --bceval-output "${{ env.BCEVAL_RESULT_FILE }}" --summary-output "${{ env.SUMMARY_OUTPUT_FILE }}"

      - name: Upload evaluation summary to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-summary
          path: ${{ inputs.results-dir }}/${{ github.run_id }}/${{ env.SUMMARY_OUTPUT_FILE }}
          if-no-files-found: error
          retention-days: ${{ inputs.mock && 1 || 30 }}

      - name: Upload result with bceval to Braintrust
        env:
          BRAINTRUST_PROJECT_ID: ${{ secrets.BRAINTRUST_PROJECT_ID }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          ADO_TOKEN: ${{ secrets.ADO_TOKEN }}
          USERNAME: ${{ secrets.USERNAME }}
        if: ${{ !inputs.mock }}
        run: |
          # Install bc-eval from ADO feed using CLI options (won't touch uv.lock)
          uv tool install bc-eval --index "https://${{ env.USERNAME }}:${{ env.ADO_TOKEN }}@dynamicssmb2.pkgs.visualstudio.com/1fcb79e7-ab07-432a-a3c6-6cf5a88ba4a5/_packaging/PythonPackages%40Local/pypi/simple/"

          # Upload summary to Braintrust using bc-eval
          $bcevalResultsFile = "${{ inputs.results-dir }}/${{ github.run_id }}/${{ env.BCEVAL_RESULT_FILE }}"
          $evalRunName = "${{ inputs.agent }} (${{ inputs.model }}) - #${{ github.run_id }}"

          bceval metrics calculate --input-file $bcevalResultsFile --evaluators "resolution_rate" --evaluator-definitions "${{ github.workspace }}/evaluator/scores.py" --eval-run-name $evalRunName

      - name: Update leaderboard in a new branch
        if: ${{ !inputs.mock }}
        run: |
          git fetch origin main

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch from main
          $branchName = "leaderboard/${{ github.run_id }}"
          git checkout -b $branchName origin/main

          uv run bcbench result update "${{ inputs.results-dir }}/${{ github.run_id }}/${{ env.SUMMARY_OUTPUT_FILE }}"

          git add docs/_data/leaderboard.json
          git commit -m "Update leaderboard: ${{ inputs.agent }} (${{ inputs.model }})"

          git push --set-upstream origin $branchName
