            begin
            end;
            //--
      comments:
        - author: Agent
          body: |
            Hi @AleksandricMarko,

            Thanks for submitting the issue. To help us address it efficiently, could you please update it to include the minimum required details?

            📚 [Extensibility Contribution Guidelines](https://learn.microsoft.com/en-us/dynamics365/business-central/dev-itpro/developer/devenv-contribute-extensibility)

            **Missing/Incorrect Information:**

            - **Invocation Example**: How the event will be raised in your code, with a sample subscriber showing intended use
            - **Alternatives Evaluated**: Which existing events, patterns, or extensibility points were tried and why they weren't sufficient
            - **Justification for IsHandled**: Why a standard (non-IsHandled) event, redesign, or contribution isn't feasible
            - **Performance Considerations**: Expected frequency of execution and any potential impact (loops, large datasets, locking, external calls)
            - **Data Sensitivity Review**: Confirmation that the event doesn't expose sensitive or security-relevant data, or rationale if it must
            - **Multi-Extension Interaction**: Risks if multiple extensions subscribe and explanation of how conflicts or ordering are mitigated

            Let us know once it's updated — we'll be happy to take a closer look.

        - author: Partner
          body: |
            Hello,
            please check bellow
            codeunit 50100 "CZL Advance Payment Excl."
            {
                [EventSubscriber(ObjectType::Report, Report::"Adjust Exchange Rates CZL", 'OnAfterGetRecordVendorOnBeforeSetTempVendorLedgerEntry', '', false, false)]
                local procedure ExcludeAdvancePaymentsFromAdjustment(var AdjustExchangeRates: Report "Adjust Exchange Rates CZL"; DetailedVendorLedgEntry: Record "Detailed Vendor Ledg. Entry"; VendorLedgerEntry: Record "Vendor Ledger Entry"; var TempVendorLedgerEntry: Record "Vendor Ledger Entry"; StartDate: Date; EndDate: Date; var IsHandled: Boolean)
                var
                    VendorLedgerEntryLocal: Record "Vendor Ledger Entry";
                begin
                    // Exclude advance payments from currency adjustment for CZ legislation
                    VendorLedgerEntryLocal.Get(VendorLedgerEntry."Entry No.");
                    if VendorLedgerEntryLocal."Prepayment" then begin
                        IsHandled := true; // Skip this entry from adjustment
                        exit;
                    end;
                end;
            }

            Alternatives Evaluated
            We evaluated the following alternatives:

            Existing OnVendorAfterGetRecordOnAfterFindVendLedgerEntriesToAdjust event: This event fires after all entries are already collected in the temp table, making it too late to exclude specific entries before they're processed.
            Modifying the report directly: Not feasible as we need to maintain compatibility with base application updates and cannot modify Microsoft's localization code.
            Post-processing with another report: Would require reversing adjustments, creating additional G/L entries and complexity, violating clean accounting practices.
            Custom filtering via request page: The standard filter options don't provide field-level filtering for prepayment/advance payment flags.
            None of these approaches allow us to conditionally exclude specific ledger entries during the collection phase based on CZ-specific business rules.

            Justification for IsHandled
            IsHandled is necessary because:

            Conditional exclusion logic: We need to prevent specific vendor ledger entries (advance payments) from being added to the temporary table based on runtime evaluation. A standard event would still process all entries.
            Legal compliance: CZ legislation requires advance payments to be excluded from currency adjustments. IsHandled provides the control mechanism to enforce this requirement.
            Cannot contribute to base code: This is CZ-specific legislation that shouldn't be in the base localization report. The flexibility to stop processing per entry is essential.
            Standard event insufficient: Without IsHandled, the entry would still be added to TempVendorLedgerEntry even after our subscriber runs, defeating the purpose.

            Performance Considerations
            Execution frequency: This report typically runs monthly or quarterly during period-end closing for exchange rate adjustments. Not a high-frequency operation.
            Performance impact: Minimal - the event fires once per vendor ledger entry during the loop (typically 100-1000 entries per vendor). Our subscriber performs a single table read to check the prepayment flag.
            No loops or external calls: The subscriber code is lightweight - just checking a boolean field value and setting IsHandled.
            No locking concerns: Read-only operation during report execution.

            Data Sensitivity Review
            No sensitive data exposure: The event parameters include standard vendor ledger entry data (entry numbers, dates) that subscribers already have access to through normal table permissions.
            No security concerns: The report already processes this data; the event doesn't expose any additional sensitive information.
            Existing permission model applies: Only users with permissions to run the "Adjust Exchange Rates CZL" report and read vendor ledger entries can utilize this event.

            Multi-Extension Interaction
            Low conflict risk: The IsHandled pattern naturally handles multiple subscribers:
            First subscriber to set IsHandled := true prevents the entry from being processed
            Subsequent subscribers can check if IsHandled is already true before executing their logic
            Expected usage: This is a CZ localization-specific scenario; unlikely that multiple extensions would need to exclude the same entries

        - author: Agent
          body: |
            Hello @AleksandricMarko
            Would it be acceptable for you to have OnAfterGetRecordVendorOnAfterFilterDetailedVendorLedgEntry event instead adding it in the loop?

        - author: Partner
          body: |
            It is a bit more coding for us, but it should work

    expected:
      labels: "Finance, event-request"
      comments: ""
